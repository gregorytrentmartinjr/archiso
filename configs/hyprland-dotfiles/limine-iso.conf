# %INSTALL_DIR%, %ARCH%, and %ARCHISO_UUID% are replaced at ISO build time
# by the Limine bootmode functions in bootmodes/limine.sh.
#
# boot():// refers to the volume on which limine.conf was found.  Limine
# scans all accessible partitions for its config; when it finds this file
# on the ISO9660 partition, that partition becomes the root of boot()://.

/Mainstream Installer (%ARCH%)
    protocol: linux
    kernel_path: boot():///%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
    module_path: boot():///%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    cmdline: archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet loglevel=3 amdgpu.sg_display=0 copytoram=n

/Mainstream Installer — AMD RDNA4 / RX 9070 XT (%ARCH%)
    protocol: linux
    kernel_path: boot():///%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
    module_path: boot():///%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    cmdline: archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet loglevel=3 amdgpu.sg_display=0 amdgpu.dcdebugmask=0x10 amdgpu.noretry=0 copytoram=n

/Mainstream Installer — nomodeset fallback (%ARCH%)
    protocol: linux
    kernel_path: boot():///%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
    module_path: boot():///%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    cmdline: archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% nomodeset copytoram=n
