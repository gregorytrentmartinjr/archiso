# Arch Linux Hyprland Dotfiles - Live ISO Environment
# Minimal Hyprland config for the installer environment

################
### MONITORS ###
################
monitor=,preferred,auto,auto

#################
### AUTOSTART ###
#################
exec-once = nm-applet &
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &
exec-once = pipewire &
exec-once = wireplumber &
exec-once = pipewire-pulse &

# Auto-launch Calamares immediately
exec-once = /usr/local/bin/calamares-launch

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.9
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

gestures {
    # workspace_swipe removed in Hyprland 0.41+
}

####################
### KEYBINDINGSS ###
####################
$mainMod = SUPER

bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, nautilus
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, fuzzel
bind = $mainMod SHIFT, C, exec, /usr/local/bin/calamares-launch
bind = $mainMod, F, fullscreen

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3

# Move windows
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Screenshot
bind = , Print, exec, grim -g "$(slurp -d)" - | swappy -f -

##################
### WINDOW RULES ###
##################
windowrule = float, class:^(calamares)$
windowrule = suppressevent fullscreen maximize, class:^(calamares)$
windowrule = size 900 700, class:^(calamares)$
windowrule = center, class:^(calamares)$

# Fallback match by title in case class differs when run as root
windowrule = float, title:^(Calamares)(.*)$
windowrule = suppressevent fullscreen maximize, title:^(Calamares)(.*)$
windowrule = size 900 700, title:^(Calamares)(.*)$
windowrule = center, title:^(Calamares)(.*)$
