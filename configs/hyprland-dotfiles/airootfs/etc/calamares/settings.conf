# Calamares settings for Mainstream Dotfiles installer

modules-search: [ /etc/calamares/modules, local, /usr/lib/calamares/modules ]

navigation-style: horizontal

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - netinstall
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - luksbootkeyfile
    - users
    - removeuser
    - displaymanager
    - networkcfg
    - hwclock
    - shellprocess@preinstall
    - shellprocess@yay
    - shellprocess@dotfiles
    - shellprocess@limine
    - shellprocess@postinstall
    - packages
    - services-systemd
    - umount
  - show:
    - finished

branding: hyprland

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
