# Calamares settings for Arch Linux Hyprland Dotfiles installer

modules-search: [ local, /usr/lib/calamares/modules ]

navigation-style: horizontal

sequence:
  - show:
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - luksbootkeyfile
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - shellprocess@pre-install
    - packages
    - shellprocess@install-yay
    - shellprocess@install-dotfiles
    - grubcfg
    - bootloader
    - shellprocess@post-install
    - removeuser
    - umount
  - show:
    - finished

branding: hyprland

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false
