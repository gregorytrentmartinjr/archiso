<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- OS Only — terminal prompt -->
  <rect width="256" height="256" rx="32" fill="#211f26"/>
  <!-- Terminal window frame -->
  <rect x="32" y="44" width="192" height="168" rx="16" fill="#1d1b20" stroke="#49454f" stroke-width="2"/>
  <!-- Title bar dots -->
  <circle cx="56" cy="64" r="5" fill="#cfbcff" opacity="0.5"/>
  <circle cx="74" cy="64" r="5" fill="#cfbcff" opacity="0.35"/>
  <circle cx="92" cy="64" r="5" fill="#cfbcff" opacity="0.2"/>
  <!-- Prompt line 1: $ _ -->
  <text x="52" y="108" font-family="monospace" font-size="20" font-weight="bold" fill="#cfbcff">$</text>
  <rect x="72" y="94" width="12" height="20" rx="2" fill="#cfbcff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Prompt line 2: ~ -->
  <text x="52" y="140" font-family="monospace" font-size="16" fill="#938f99">~</text>
  <!-- Prompt line 3 -->
  <text x="52" y="168" font-family="monospace" font-size="16" fill="#938f99">~</text>
</svg>
