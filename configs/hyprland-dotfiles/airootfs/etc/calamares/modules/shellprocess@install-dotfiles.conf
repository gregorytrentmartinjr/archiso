---
# Install illogical-impulse dotfiles (gregorytrentmartinjr/dots-hyprland newcustom branch)
# Installs AUR packages via yay, then sets up configs and services
# Runs in chroot as the newly created user (uid 1000)

dontChroot: false
timeout: 7200

script:
    - "-"
    - command: "bash /usr/local/bin/install-dotfiles"
      timeout: 7200
