---
# Post-install cleanup

dontChroot: false
timeout: 120

script:
    - "-"
    # Remove build user
    - command: "bash -c 'userdel -r builduser 2>/dev/null || true'"
      timeout: 30
    # Remove no-password sudo for builduser
    - command: "bash -c 'rm -f /etc/sudoers.d/builduser'"
      timeout: 10
    # Remove liveuser from the installed system
    - command: "bash -c 'userdel -r liveuser 2>/dev/null || true'"
      timeout: 30
    # Ensure wheel group has sudo access in installed system
    - command: "bash -c 'echo \"%wheel ALL=(ALL:ALL) ALL\" > /etc/sudoers.d/wheel && chmod 0440 /etc/sudoers.d/wheel'"
      timeout: 10
    # Enable nss-mdns for printer discovery
    - command: "bash -c 'sed -i \"s/^hosts:.*/hosts: mymachines mdns_minimal [NOTFOUND=return] resolve [!UNAVAIL=return] files myhostname dns/\" /etc/nsswitch.conf 2>/dev/null || true'"
      timeout: 10
    # Enable bluetooth auto-connect
    - command: "bash -c 'mkdir -p /etc/bluetooth && if [ -f /etc/bluetooth/main.conf ]; then sed -i \"s/^#*AutoEnable.*/AutoEnable=true/\" /etc/bluetooth/main.conf; fi'"
      timeout: 10
    # Setup pwfeedback for sudo
    - command: "bash -c 'echo \"Defaults pwfeedback\" > /etc/sudoers.d/pwfeedback && chmod 0440 /etc/sudoers.d/pwfeedback'"
      timeout: 10
    # Setup i2c module loading (for ddcutil)
    - command: "bash -c 'echo i2c-dev > /etc/modules-load.d/i2c-dev.conf'"
      timeout: 10
    # Install first-login service
    - command: "bash -c 'cp /usr/local/bin/dotfiles-first-login /etc/profile.d/dotfiles-first-login.sh && chmod 755 /etc/profile.d/dotfiles-first-login.sh'"
      timeout: 10
