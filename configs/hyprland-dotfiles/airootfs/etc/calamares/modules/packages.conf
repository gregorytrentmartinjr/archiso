---
# Optional packages — installs whatever the user selected in the
# packagechooser step. Runs after shellprocess so pre-install has
# already called pacman -Sy and the chroot DB is current.
#
# All packages listed in packagechooser.conf (discord, obs-studio,
# firefox) are in the official Arch extra repo, so no AUR is needed.

backend: pacman

update_db: false

operations:
    - install:
        - packagechooser_packagechooser
