---
# Packages module - removes live-only packages from the installed system
# NOTE: All install-section packages are already in the squashfs via packages.x86_64
# so reinstalling them here is redundant and causes keyring verification failures.
# Additional packages are installed by install-dotfiles via yay/pacman in shellprocess.

backend: pacman

update_db: false

operations:
    - remove:
        - calamares
        - mkinitcpio-archiso
        - arch-install-scripts
        - archinstall
        - reflector
        - livecd-sounds
        - mkinitcpio-nfs-utils
        - memtest86+
        - memtest86+-efi
        - nbd
