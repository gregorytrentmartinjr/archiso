---
# Packages module - installs additional packages via pacman into the target

backend: pacman

update_db: true

operations:
    - install:
        # Base system
        - base
        - base-devel
        - linux
        - linux-headers
        - linux-firmware
        - linux-firmware-marvell
        - amd-ucode
        - intel-ucode
        - sudo
        - bash
        - zsh
        - fish
        # Bootloader
        - grub
        - efibootmgr
        - os-prober
        # Networking
        - networkmanager
        - network-manager-applet
        - nm-connection-editor
        - iwd
        - wpa_supplicant
        - wireless-regdb
        - nss-mdns
        - avahi
        # Bluetooth
        - bluez
        - bluez-utils
        - bluedevil
        # Printing
        - cups
        - cups-pdf
        - cups-filters
        - system-config-printer
        - hplip
        - ghostscript
        - gsfonts
        # Display / Wayland
        - wayland
        - xorg-xwayland
        - wayland-protocols
        - qt5-wayland
        - qt6-wayland
        # GPU
        - mesa
        - vulkan-radeon
        - vulkan-intel
        # Display manager
        - sddm
        - qt6-5compat
        - qt6-declarative
        # Hyprland & stack
        - hyprland
        - hypridle
        - hyprlock
        - hyprpicker
        - hyprsunset
        - xdg-desktop-portal
        - xdg-desktop-portal-hyprland
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-kde
        - xdg-utils
        - wl-clipboard
        - cliphist
        # Audio
        - pipewire
        - pipewire-audio
        - pipewire-alsa
        - pipewire-jack
        - pipewire-pulse
        - wireplumber
        - pavucontrol-qt
        - alsa-utils
        - playerctl
        - libdbusmenu-gtk3
        - cava
        # Fonts
        - fontconfig
        - ttf-jetbrains-mono-nerd
        - ttf-liberation
        - noto-fonts
        - noto-fonts-emoji
        - papirus-icon-theme
        # Terminals
        - kitty
        # File manager
        - nautilus
        - gvfs
        - gvfs-smb
        - gvfs-mtp
        - ffmpegthumbnailer
        - udisks2
        - udiskie
        # App launcher / widgets
        - fuzzel
        - wlogout
        - rofi-wayland
        # Screenshot / record
        - slurp
        - grim
        - swappy
        - wf-recorder
        - tesseract
        - tesseract-data-eng
        # Theming
        - breeze
        - qt6ct
        - kvantum
        - gtk4
        - libadwaita
        # Shell extras
        - starship
        - eza
        # System tools
        - bc
        - curl
        - wget
        - rsync
        - jq
        - ripgrep
        - imagemagick
        - upower
        - brightnessctl
        - ddcutil
        - geoclue
        - flatpak
        - polkit-kde-agent
        - gnome-keyring
        - plasma-nm
        - ntfs-3g
        - dosfstools
        - exfatprogs
        - btrfs-progs
        - xfsprogs
        - e2fsprogs
        - udisks2
        - udiskie
        - fuse2
        - wtype
        - ydotool
        # Python / build deps
        - python
        - python-pip
        - python-gobject
        - clang
        - cmake
        - git
        - go
        - libsoup3
        # KDE integration
        - plasma-nm
        - bluedevil
        # Misc
        - nano
        - vim
        - htop
        - man-db
        - openssh
        # Translate-shell for widgets
        - translate-shell
        - libqalculate
