---
# Packages module - removes live-only packages from the installed system
# Ground truth: pacman -Qe on a fresh minimal archinstall + dotfiles system

backend: pacman

update_db: false

operations:
    - remove:
        # Calamares installer — live only
        - calamares
        # archiso / install tooling — live only
        - arch-install-scripts
        - archinstall
        - mkinitcpio-archiso
        - mkinitcpio-nfs-utils
        - nbd
        - squashfs-tools
        - syslinux
        - mtools
        - edk2-shell
        - memtest86+
        - memtest86+-efi
        - livecd-sounds
        - pv
        - reflector
        # Live environment extras not needed on installed system
