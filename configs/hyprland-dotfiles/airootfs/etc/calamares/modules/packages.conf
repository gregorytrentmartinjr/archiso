---
# Optional packages — installs whatever the user selected in the
# netinstall step. Runs after shellprocess so pre-install has
# already called pacman -Sy and the chroot DB is current.
#
# The netinstall module writes selected packages to the GlobalStorage key
# "packageOperations", which this module picks up automatically.  No
# explicit package list is needed here.
#
# All packages listed in netinstall.conf (discord, obs-studio, firefox)
# are in the official Arch extra repo, so no AUR is needed.

backend: pacman

update_db: false
