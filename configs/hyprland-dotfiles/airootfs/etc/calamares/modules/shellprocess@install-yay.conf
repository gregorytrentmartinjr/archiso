---
# Install yay AUR helper in the target system
# Runs as root in chroot, builds yay as a build user

dontChroot: false
timeout: 600

script:
    - "-"
    - command: "bash -c 'useradd -m -G wheel builduser 2>/dev/null || true'"
      timeout: 10
    - command: "bash -c 'echo \"%wheel ALL=(ALL) NOPASSWD: ALL\" > /etc/sudoers.d/builduser'"
      timeout: 10
    - command: "bash -c 'pacman -S --needed --noconfirm base-devel git go 2>&1'"
      timeout: 300
    - command: "bash -c 'rm -rf /tmp/yay-build && mkdir -p /tmp/yay-build && chown builduser:builduser /tmp/yay-build'"
      timeout: 30
    - command: "bash -c 'sudo -u builduser git clone https://aur.archlinux.org/yay-bin.git /tmp/yay-build'"
      timeout: 120
    - command: "bash -c 'cd /tmp/yay-build && sudo -u builduser makepkg -si --noconfirm 2>&1'"
      timeout: 300
    - command: "bash -c 'rm -rf /tmp/yay-build'"
      timeout: 30
