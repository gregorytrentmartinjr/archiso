---
# Optional software selection — shown as checkboxes between the users
# and summary steps.
#
# method: packages  → writes package lists directly to GlobalStorage in the
#                     format the `packages` module consumes.
# mode: optionalmultiple → zero-or-more checkboxes (nothing selected = skip).

mode: optionalmultiple
method: packages

labels:
    step: "Optional Software"

items:
    - id: discord
      packages:
          - discord
      name: "Discord"
      description: "Voice, video, and text chat platform. Free and widely used for gaming and communities."
      screenshot: "logo.png"

    - id: obs-studio
      packages:
          - obs-studio
      name: "OBS Studio"
      description: "Free and open source software for video recording and live streaming."
      screenshot: "logo.png"

    - id: firefox
      packages:
          - firefox
      name: "Firefox"
      description: "Mozilla Firefox — fast, private, and open source web browser."
      screenshot: "logo.png"
