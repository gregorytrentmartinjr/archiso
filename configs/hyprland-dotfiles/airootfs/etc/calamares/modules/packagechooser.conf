---
# Optional software selection — shown as checkboxes between the users
# and summary steps. Selections are stored in GlobalStorage under
# "packagechooser_packagechooser" and consumed by the packages module
# after shellprocess completes.

mode: multiple

labels:
  step: "Optional Software"
  title: "Optional Software"
  description: "Select any additional applications to install. You can install or remove these later with pacman."

items:
  - id: discord
    package:
      - discord
    name:
      en: "Discord"
    description:
      en: "Voice, video, and text chat platform. Free and widely used for gaming and communities."

  - id: obs-studio
    package:
      - obs-studio
    name:
      en: "OBS Studio"
    description:
      en: "Free and open source software for video recording and live streaming."

  - id: firefox
    package:
      - firefox
    name:
      en: "Firefox"
    description:
      en: "Mozilla Firefox — fast, private, and open source web browser."
