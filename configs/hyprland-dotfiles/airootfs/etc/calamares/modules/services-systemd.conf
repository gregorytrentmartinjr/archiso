---
# Systemd services for the installed system

services:
    # --- Enable ---
    - name: NetworkManager
      enabled: true
    - name: bluetooth
      enabled: true
    - name: cups
      enabled: true
    - name: avahi-daemon
      enabled: true
    - name: sddm
      enabled: true
    - name: fstrim.timer
      enabled: true

    # --- Disable live-only services ---

    # Pacman keyring init — live ISO only
    - name: pacman-init.service
      enabled: false

    # Wireless daemons — replaced by NetworkManager on installed system
    - name: iwd.service
      enabled: false
    - name: wpa_supplicant.service
      enabled: false

    # SSH — enabled on live ISO for remote access, not needed on installed system
    - name: sshd.service
      enabled: false

    # Mirror refresh — live ISO only
    - name: reflector.service
      enabled: false
    - name: reflector.timer
      enabled: false

    # systemd-networkd — live uses this, installed system uses NetworkManager
    - name: systemd-networkd.service
      enabled: false
    - name: systemd-networkd-persistent-storage.service
      enabled: false

    # LVM monitoring — enabled by default on live ISO, not needed without LVM
    - name: lvm2-monitor.service
      enabled: false

    # udev settle — not needed on installed systems, can cause slow boots
    - name: systemd-udev-settle.service
      enabled: false

    # systemd-resolved — live ISO uses this for DNS, NetworkManager handles it on installed system
    - name: systemd-resolved.service
      enabled: false

    # ModemManager — live ISO enables this, not needed unless using a mobile modem
    - name: ModemManager.service
      enabled: false

targets:
    - name: multi-user.target
      enabled: true
