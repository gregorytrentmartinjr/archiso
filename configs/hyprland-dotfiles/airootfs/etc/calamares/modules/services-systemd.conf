---
# Services configuration — matches enabled services on minimal archinstall + dotfiles
# Ground truth: systemctl list-unit-files --state=enabled on working system

services:
    enabled:
        - NetworkManager
        - NetworkManager-dispatcher
        - NetworkManager-wait-online
        - bluetooth
        - cups
        - sddm
        - systemd-timesyncd
        - snapper-cleanup.timer
        - snapper-timeline.timer

    disabled:
        - pacman-init
        - reflector
        - reflector.timer
        - iwd
        - wpa_supplicant
        - systemd-networkd
        - systemd-networkd-persistent-storage
        - systemd-resolved
        - sshd
        - lvm2-monitor
        - systemd-udev-settle
        - ModemManager
