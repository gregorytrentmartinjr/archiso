---
# Services configuration — matches enabled services on minimal archinstall + dotfiles
# Ground truth: systemctl list-unit-files --state=enabled on working system

services:
    enabled:
        - NetworkManager
        - NetworkManager-dispatcher
        - bluetooth
        # cups is intentionally NOT here — cups.socket (already present) handles
        # socket activation so cups.service starts on first print job only.
        # Starting cups at boot wastes ~58ms with no benefit on most installs.
        - sddm
        - systemd-timesyncd
        - snapper-cleanup.timer
        - snapper-timeline.timer

    disabled:
        - NetworkManager-wait-online
        - pacman-init
        - reflector
        - reflector.timer
        - iwd
        - wpa_supplicant
        - cups
        - systemd-networkd
        - systemd-networkd-persistent-storage
        - systemd-resolved
        - sshd
        - lvm2-monitor
        - systemd-udev-settle
        - ModemManager
