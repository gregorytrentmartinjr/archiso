---
# installchoice.conf — packagechooser instance for install-mode selection.
#
# Presents three radio-button options before the optional-apps page.
# The selected item id is stored in GlobalStorage as
# "packagechooser_installchoice".  The custom packages module reads this
# value to decide whether to install default apps, user-selected apps,
# or nothing.

mode:   required
method: legacy

labels:
    step:  "Apps"
    step[nl]: "Apps"

items:
    - id:          default
      name:        "Default Apps"
      description: "Everything you need for a complete desktop experience. Ideal for new Linux users, family computers, or anyone who wants a fully-equipped system right out of the box."
      screenshot:  "/etc/calamares/branding/hyprland/choice_default.svg"

    - id:          customize
      name:        "Customize Your Apps"
      description: "Hand-pick from a curated selection of popular Linux applications. Perfect if you know what you want or prefer to choose exactly what gets installed."
      screenshot:  "/etc/calamares/branding/hyprland/choice_customize.svg"

    - id:          minimal
      name:        "OS Only"
      description: "A clean slate with just the base system and desktop. For experienced users who prefer to build their own setup from scratch."
      screenshot:  "/etc/calamares/branding/hyprland/choice_osonly.svg"
