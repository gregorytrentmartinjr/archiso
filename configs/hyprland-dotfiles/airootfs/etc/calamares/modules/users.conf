---
# Users module config

defaultGroups:
    - name: users
      state: create
    - name: lp
      state: create
    - name: video
      state: create
    - name: network
      state: create
    - name: storage
      state: create
    - name: wheel
      state: create
    - name: audio
      state: create
    - name: input
      state: create
    - name: i2c
      state: create
    - name: power
      state: create
    - name: optical
      state: create

autologinGroup:  autologin
doAutologin:     false
sudoersGroup:    wheel
setRootPassword: true
doReusePassword: false

passwordRequirements:
    nonempty: true
    minLength: -1
    maxLength: -1
    libpwquality:
        - minlen=0
        - minclass=0

avatarFilePath: ~/.face
permitWeakPasswords: false
forbidBadPasswords: true

userShell: /usr/bin/bash
