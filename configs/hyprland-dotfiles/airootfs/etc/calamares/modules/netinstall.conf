            description: "Signal — end-to-end encrypted messaging for privacy-conscious users."
          - name: slack-desktop
            description: "Slack — team messaging and collaboration platform. (AUR)"
          - name: zoom
            description: "Zoom — widely used video conferencing and webinar platform. (AUR)"
          - name: teams-for-linux
            description: "Teams for Linux — unofficial Microsoft Teams client. (AUR)"
          - name: element-desktop
            description: "Element — open-source Matrix client for decentralized, federated chat."
