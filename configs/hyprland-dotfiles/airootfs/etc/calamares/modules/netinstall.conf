---
# Optional software selection — shown as a checkbox tree between the users
# and summary steps.
#
# groupsUrl: local means groups are defined inline in this file.
# Selected packages are written to GlobalStorage "packageOperations" and
# installed by the "packages" module in the exec sequence.
#
# selected: false — all packages start unchecked so none are installed by
# default. The user checks whatever they want.
#
# Note: packages marked (AUR) require yay and are installed in post-install.
# Packages without a mark are from the official Arch repositories.

groupsUrl: local

groups:
    - name: "📦 Included Extras"
      description: "Recommended apps pre-selected for a complete desktop. Uncheck any you don't want."
      selected: true
      critical: false
      packages:
