---
# Optional software selection — shown as a checkbox tree between the users
# and summary steps.
#
# groupsUrl: local means groups are defined inline in this file.
# Selected packages are written to GlobalStorage "packageOperations" and
# installed by the "packages" module in the exec sequence.
#
# selected: false — all packages start unchecked so none are installed by
# default. The user checks whatever they want.
#
# Note: packages marked (AUR) require yay and are installed in post-install.
# Packages without a mark are from the official Arch repositories.

groupsUrl: local

groups:
    - name: "🌐 Web Browsers"
      description: "Web browsers for everyday browsing."
      selected: false
      critical: false
      packages:
          - name: firefox
            description: "Mozilla Firefox — fast, private, and open-source web browser. Default on most distros."
          - name: chromium
            description: "Open-source base of Google Chrome. No proprietary Google bits."
          - name: google-chrome
            description: "Google Chrome — full Chrome with DRM and Widevine support. (AUR)"
          - name: brave-bin
            description: "Brave — privacy-focused browser with built-in ad blocking. (AUR)"
          - name: librewolf-bin
            description: "LibreWolf — hardened Firefox fork with strict privacy defaults. (AUR)"

    - name: "💻 Development Tools"
      description: "IDEs, editors, version control, and containerization."
      selected: false
      critical: false
      packages:
          - name: code
            description: "VS Code — most popular open-source code editor by Microsoft."
          - name: neovim
            description: "Neovim — hyperextensible Vim-based terminal editor."
          - name: vim
            description: "Vim — classic, highly configurable terminal text editor."
          - name: jetbrains-toolbox
            description: "JetBrains Toolbox — manage PyCharm, IDEA, and other JetBrains IDEs. (AUR)"
          - name: github-cli
            description: "GitHub CLI — interact with GitHub repositories from the terminal."
          - name: docker
            description: "Docker — build, ship, and run containerized applications."

    - name: "🎵 Media & Entertainment"
      description: "Music, video, and media server applications."
      selected: false
      critical: false
      packages:
          - name: vlc
            description: "VLC — versatile media player that plays virtually any format."
          - name: spotify
            description: "Spotify — official streaming music client. (AUR)"
          - name: mpv
            description: "mpv — lightweight, scriptable command-line video player."
          - name: plex-media-server
            description: "Plex — personal media server with a polished streaming interface. (AUR)"
          - name: jellyfin-server
            description: "Jellyfin — free, open-source media server. No subscription required."
          - name: rhythmbox
            description: "Rhythmbox — music player and library manager for GNOME."
          - name: lollypop
            description: "Lollypop — modern music player with cover art and online radio."

    - name: "📁 Productivity & Office"
      description: "Office suites, note-taking, email, and document tools."
      selected: false
      critical: false
      packages:
          - name: libreoffice-fresh
            description: "LibreOffice — full-featured office suite (Writer, Calc, Impress, etc.)."
          - name: obsidian
            description: "Obsidian — powerful Markdown note-taking and knowledge base app."
          - name: thunderbird
            description: "Thunderbird — Mozilla email client with calendar and feed support."
          - name: okular
            description: "Okular — feature-rich document viewer supporting PDF, ePub, and more."
          - name: evince
            description: "Evince — lightweight PDF and document viewer for GNOME."
          - name: keepassxc
            description: "KeePassXC — cross-platform, offline password manager."

    - name: "🛡️ System & Utilities"
      description: "System monitoring, backup, and management tools."
      selected: false
      critical: false
      packages:
          - name: htop
            description: "htop — interactive process viewer and system monitor."
          - name: btop
            description: "btop — beautiful, resource-efficient system monitor with mouse support."
          - name: timeshift
            description: "Timeshift — system snapshot and restore tool (rsync or btrfs)."
          - name: flatseal
            description: "Flatseal — graphical tool to manage Flatpak application permissions."
          - name: stacer
            description: "Stacer — system optimizer, cleaner, and service manager. (AUR)"
          - name: ventoy
            description: "Ventoy — create bootable USB drives supporting multiple ISOs."

    - name: "🎮 Gaming"
      description: "Game launchers, compatibility layers, and gaming utilities."
      selected: false
      critical: false
      packages:
          - name: steam
            description: "Steam — Valve's game distribution platform with Proton compatibility."
          - name: lutris
            description: "Lutris — open game manager with Wine and emulator frontend support."
          - name: heroic-games-launcher-bin
            description: "Heroic — open-source launcher for Epic Games Store and GOG. (AUR)"
          - name: mangohud
            description: "MangoHud — in-game performance overlay (FPS, CPU, GPU, temps)."
          - name: bottles
            description: "Bottles — run Windows applications and games via Wine environments."

    - name: "🎨 Graphics & Creative"
      description: "Image editing, vector graphics, video production, and 3D tools."
      selected: false
      critical: false
      packages:
          - name: gimp
            description: "GIMP — full-featured image editor, open-source Photoshop alternative."
          - name: inkscape
            description: "Inkscape — professional vector graphics editor (SVG-based)."
          - name: kdenlive
