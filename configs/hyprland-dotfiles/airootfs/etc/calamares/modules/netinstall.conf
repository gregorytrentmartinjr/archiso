---
# Optional software selection — shown as a checkbox tree between the users
# and summary steps.
#
# groupsUrl: local means groups are defined inline in this file.
# Selected packages are written to GlobalStorage "packageOperations" and
# installed by the "packages" module in the exec sequence.
#
# selected: false — all packages start unchecked so none are installed by
# default. The user checks whatever they want.

groupsUrl: local

groups:
    - name: "Optional Software"
      description: "Select additional software to install after setup completes."
      selected: false
      critical: false
      packages:
          - name: discord
            description: "Voice, video, and text chat platform. Free and widely used for gaming and communities."
          - name: obs-studio
            description: "Free and open source software for video recording and live streaming."
          - name: firefox
            description: "Mozilla Firefox — fast, private, and open source web browser."
