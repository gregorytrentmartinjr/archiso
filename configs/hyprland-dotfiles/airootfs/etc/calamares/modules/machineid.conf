# Generate a real 32-character hex machine-id during installation.
# Without this, /etc/machine-id may remain "uninitialized" (from mkarchiso),
# which breaks limine-mkinitcpio-hook (requires a valid 32-char machine-id
# to store kernel/initramfs on the EFI partition).
systemd: true
dbus: true
symlink: false
dbus-symlink: false
