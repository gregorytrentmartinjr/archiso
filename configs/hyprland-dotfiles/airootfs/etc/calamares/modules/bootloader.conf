---
# Changed from "none" to "grub" to ensure the system is bootable
efiBootLoader: "grub"

grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"

# Changed from "none" to "Arch" to create a named entry in UEFI NVRAM
efiBootLoaderId: "Arch"

# Changed to true to provide a backup boot path at /boot/efi/EFI/BOOT/BOOTX64.EFI
installEFIfallback: true

canBeResized: false