---
# Partition module config

# ---------------------------------------------------------------------------
# EFI system partition
# Note: efiSystemPartition / efiSystemPartitionSize / efiSystemPartitionName
# are deprecated aliases — use the efi: block below instead (Calamares 3.3+)
# ---------------------------------------------------------------------------
efi:
    mountPoint:      "/boot/efi"
    recommendedSize: 1024MiB
    minimumSize:     512MiB
    label:           "EFI"

# ---------------------------------------------------------------------------
# Filesystem
# ---------------------------------------------------------------------------
defaultFileSystemType: "btrfs"
availableFileSystemTypes:
    - btrfs

# ---------------------------------------------------------------------------
# Partitioning defaults
# ---------------------------------------------------------------------------
# Force GPT — required for EFI-only installs with Limine
requiredPartitionTableType: gpt

# Do not pre-select a partitioning mode — user must choose deliberately
initialPartitioningChoice: none

# Draw logical/nested partitions as visually nested
drawNestedPartitions: false

# Always show partition labels in the manual partitioning view
alwaysShowPartitionLabels: true

# Allow manual partitioning
allowManualPartitioning: true

# Show the "boot partition not encrypted" warning when root is encrypted
showNotEncryptedBootMessage: false

# ---------------------------------------------------------------------------
# Swap
# Note: 'partition' is not a valid value in Calamares 3.3+.
# Valid choices: none, small, suspend, file
#   small   — swap up to 4GB, no more than 10% of disk
#   suspend — swap >= total RAM (ensures suspend-to-disk works)
# ---------------------------------------------------------------------------
userSwapChoices:
    - none
    - small
    - suspend

initialSwapChoice: suspend

# ---------------------------------------------------------------------------
# Encryption
# luksGeneration: luks2 is safe here — Limine supports LUKS2 (unlike GRUB)
# ---------------------------------------------------------------------------
luksGeneration: luks2
