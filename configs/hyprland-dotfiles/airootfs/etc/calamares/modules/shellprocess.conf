# /etc/calamares/modules/shellprocess.conf
---
# CRITICAL: false ensures we are acting on the SSD, not the Live USB
dontChroot: false

# Set a high timeout because building 15 meta-packages takes time
timeout: 3600

script:
    # 1. Prepare the package manager and clean Archiso artifacts
    - "/usr/local/bin/pre-install"
    
    # 2. Bootstrap yay-bin for AUR support
    - "/usr/local/bin/install-yay"
    
    # 3. Build and install the 15 meta-packages and deploy dotfiles
    - "/usr/local/bin/install-dotfiles"
    
    # 4. Configure the Limine bootloader
    - "/usr/local/bin/install-limine"
    
    # 5. Fix GPU KMS, SDDM-Hyprland, cleanup builduser, and silent boot
    - "/usr/local/bin/post-install"