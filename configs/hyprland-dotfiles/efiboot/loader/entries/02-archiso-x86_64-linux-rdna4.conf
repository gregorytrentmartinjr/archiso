title    Mainstream Installer - AMD RDNA 4 / RX 9070 XT (%ARCH%)
sort-key 02
linux    /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd   /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
options  archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet loglevel=3 amdgpu.sg_display=0 amdgpu.dcdebugmask=0x10 amdgpu.noretry=0 copytoram=n
